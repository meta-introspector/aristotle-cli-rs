name = "splitter-engine"
defaultTargets = ["RequestProject"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "RequestProject"
globs = ["RequestProject.+", "RequestProject.AZ.+"]

[[lean_exe]]
name = "splitdecls"
root = "RequestProject.SplitDecls"
